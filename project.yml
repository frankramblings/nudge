name: Nudge
options:
  bundleIdPrefix: com.nudge.app
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  NagCore:
    path: NagCorePackage

targets:
  NudgeiOS:
    type: application
    platform: iOS
    sources:
      - Apps/iOS
    resources:
      - Resources/Shared
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nudge.app.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Nudge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: Nudge
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSRemindersUsageDescription: Nudge needs access to your reminders to show and manage tasks.
        NSUserNotificationsUsageDescription: Nudge uses notifications for repeating overdue reminder alerts.
        BGTaskSchedulerPermittedIdentifiers:
          - com.nudge.app.refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  NudgemacOS:
    type: application
    platform: macOS
    sources:
      - Apps/macOS
    resources:
      - Resources/Shared
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nudge.app.mac
        CODE_SIGN_ENTITLEMENTS: Nudge-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Apps/macOS/Info.plist
      properties:
        CFBundleDisplayName: Nudge
        NSRemindersUsageDescription: Nudge needs access to your reminders to show and manage tasks.
        NSUserNotificationsUsageDescription: Nudge uses notifications for repeating overdue reminder alerts.

  NagCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NagCorePackage/Tests/NagCoreTests
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nudge.app.tests
        GENERATE_INFOPLIST_FILE: YES

  NudgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests/NudgeUITests
    dependencies:
      - target: NudgeiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nudge.app.uitests
        TEST_TARGET_NAME: NudgeiOS
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Nudge-iOS:
    build:
      targets:
        NudgeiOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NagCoreTests
        - NudgeUITests
    archive:
      config: Release

  Nudge-macOS:
    build:
      targets:
        NudgemacOS: all
    run:
      config: Debug
    archive:
      config: Release
