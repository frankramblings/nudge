name: NagReminders
options:
  bundleIdPrefix: com.example.NagReminders
  deploymentTarget:
    iOS: 17.0
    macOS: 14.0
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  NagCore:
    path: NagCorePackage

targets:
  NagRemindersiOS:
    type: application
    platform: iOS
    sources:
      - Apps/iOS
    resources:
      - Resources/Shared
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NagReminders.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: NagReminders.entitlements
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: NagReminders
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSRemindersUsageDescription: NagReminders needs access to your reminders to show and manage tasks.
        NSUserNotificationsUsageDescription: NagReminders uses notifications for repeating overdue reminder alerts.
        BGTaskSchedulerPermittedIdentifiers:
          - com.example.NagReminders.refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  NagRemindersmacOS:
    type: application
    platform: macOS
    sources:
      - Apps/macOS
    resources:
      - Resources/Shared
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NagReminders.mac
        CODE_SIGN_ENTITLEMENTS: NagReminders-macOS.entitlements
    info:
      path: Apps/macOS/Info.plist
      properties:
        CFBundleDisplayName: NagReminders
        NSRemindersUsageDescription: NagReminders needs access to your reminders to show and manage tasks.
        NSUserNotificationsUsageDescription: NagReminders uses notifications for repeating overdue reminder alerts.

  NagCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NagCorePackage/Tests/NagCoreTests
    dependencies:
      - package: NagCore
        product: NagCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NagReminders.tests
        GENERATE_INFOPLIST_FILE: YES

  NagRemindersUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests/NagRemindersUITests
    dependencies:
      - target: NagRemindersiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.NagReminders.uitests
        TEST_TARGET_NAME: NagRemindersiOS
        GENERATE_INFOPLIST_FILE: YES

schemes:
  NagReminders-iOS:
    build:
      targets:
        NagRemindersiOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NagCoreTests
        - NagRemindersUITests
    archive:
      config: Release

  NagReminders-macOS:
    build:
      targets:
        NagRemindersmacOS: all
    run:
      config: Debug
    archive:
      config: Release
